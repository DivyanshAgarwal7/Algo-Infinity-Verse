<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kafka Academy - Algo Infinity Verse</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="kafka-academy.css" />
    <link rel="stylesheet" href="/styles/eli5-toggle.css" />
    <link rel="stylesheet" href="/styles/copy-code.css" />
  </head>
  <body class="bg-gray-50 text-gray-800 font-sans h-screen flex overflow-hidden light-mode">
    <!-- Mobile Sidebar Overlay -->
    <div
      id="sidebar-overlay"
      class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden"
    ></div>

    <!-- Sidebar Navigation -->
    <aside
      id="sidebar"
      class="fixed inset-y-0 left-0 z-30 w-72 bg-white shadow-xl transform -translate-x-full lg:translate-x-0 lg:static transition-transform duration-300 flex flex-col border-r border-gray-200"
    >
      <!-- Logo and Academy Title -->
      <div class="p-5 border-b flex justify-between items-center bg-red-600 text-white shadow-sm">
        <h1 class="text-xl font-bold flex items-center gap-2">
          <i class="fa-solid fa-bolt text-xl"></i> Kafka Academy
        </h1>
        <button id="close-sidebar" class="lg:hidden text-white hover:text-red-100">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
      </div>

      <!-- Course Progress Card -->
      <div class="p-5 border-b bg-red-50/20">
        <div
          class="flex justify-between text-xs mb-1.5 font-bold text-slate-500 uppercase tracking-wider"
        >
          <span>Course Progress</span>
          <span id="progress-text" class="text-red-600">0%</span>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-2">
          <div
            id="progress-bar"
            class="bg-red-600 h-2 rounded-full transition-all duration-500"
            style="width: 0%"
          ></div>
        </div>
      </div>

      <!-- Curriculum Navigation -->
      <div class="flex-1 overflow-y-auto p-4 sidebar-scroll" id="sidebar-content">
        <!-- JS will inject curriculum navigation here -->
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
      <!-- Header -->
      <header
        class="bg-white shadow-sm border-b p-4 flex items-center justify-between"
      >
        <div class="flex items-center gap-4">
          <button
            id="open-sidebar"
            class="lg:hidden text-gray-600 hover:text-red-600 transition-colors"
          >
            <i class="fa-solid fa-bars text-xl"></i>
          </button>
          <h2 id="active-module-title" class="text-lg md:text-xl font-bold text-slate-800">
            Kafka & EDA Hub
          </h2>
        </div>

        <!-- Tabs Switcher Navigation -->
        <nav class="flex space-x-1 bg-gray-100 p-1 rounded-lg">
          <button
            data-tab="lesson"
            class="tab-btn active px-3 py-2 md:px-4 text-xs md:text-sm font-bold rounded-md text-gray-700 hover:text-red-600 transition-colors"
          >
            <i class="fa-solid fa-book-open mr-1"></i>
            <span class="hidden sm:inline">Lesson Viewer</span>
          </button>
          <button
            data-tab="simulator"
            class="tab-btn px-3 py-2 md:px-4 text-xs md:text-sm font-bold rounded-md text-gray-700 hover:text-red-600 transition-colors"
          >
            <i class="fa-solid fa-project-diagram mr-1"></i>
            <span class="hidden sm:inline">Simulator</span>
          </button>
          <button
            data-tab="quiz"
            class="tab-btn px-3 py-2 md:px-4 text-xs md:text-sm font-bold rounded-md text-gray-700 hover:text-red-600 transition-colors"
          >
            <i class="fa-solid fa-list-check mr-1"></i>
            <span class="hidden sm:inline">Quiz</span>
          </button>
        </nav>
      </header>

      <!-- Content Area -->
      <div class="flex-1 overflow-hidden bg-gray-50 p-4 md:p-6 relative">
        <div
          class="bg-white rounded-xl shadow-sm border border-gray-200 w-full h-full overflow-hidden relative"
        >
          <!-- Tab 1: Lesson Content -->
          <div
            id="tab-lesson"
            class="tab-content h-full overflow-y-auto p-6 md:p-10 active"
          >
            <div class="max-w-4xl mx-auto">
              <div class="flex items-start justify-between gap-4 mb-6">
                <h2 id="lesson-title" class="text-2xl font-bold text-gray-800">
                  Welcome to Kafka Hub
                </h2>
                <button id="mark-complete-btn" class="px-5 py-2.5 rounded-lg font-medium transition-all flex items-center gap-2 bg-red-600 text-white hover:bg-red-700 shadow-sm">
                  <i class="fa-solid fa-check-circle"></i> Mark as Read
                </button>
              </div>
              <div id="lesson-body" class="lesson-body text-gray-700 leading-relaxed">
                Select a lesson from the sidebar to begin.
              </div>
              <div class="mt-8 flex justify-between items-center border-t border-gray-200 pt-6">
                <button id="prev-btn" class="px-5 py-2.5 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition-colors font-medium invisible">
                  <i class="fas fa-arrow-left mr-2"></i>Previous
                </button>
                <div class="text-xs text-gray-400 font-mono" id="lesson-id-label"></div>
                <button id="next-btn" class="px-5 py-2.5 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition-colors font-medium invisible">
                  Next<i class="fas fa-arrow-right ml-2"></i>
                </button>
              </div>
            </div>
          </div>

          <!-- Tab 2: Simulator -->
          <div
            id="tab-simulator"
            class="tab-content h-full hidden p-6 flex-col"
          >
            <div class="h-full flex flex-col">
              <div class="flex items-start justify-between gap-4 mb-4 flex-shrink-0">
                <div>
                  <h2 class="text-2xl font-bold text-gray-800">Topic Architecture Simulator</h2>
                  <p class="text-gray-500 mt-1 max-w-lg">
                    Visually simulate producers pushing messages to topics, and consumers reading
                    from partitions.
                  </p>
                </div>
                <a
                  href="../visualizers/kafka-simulator/kafka-simulator.html"
                  target="_blank"
                  rel="noopener"
                  class="shrink-0 px-4 py-2 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 transition-colors font-medium text-sm whitespace-nowrap"
                >
                  <i class="fas fa-external-link-alt mr-2"></i>Open Full Screen
                </a>
              </div>

              <div class="flex-1 min-h-0 rounded-xl overflow-hidden border border-gray-200">
                <iframe
                  src="../visualizers/kafka-simulator/kafka-simulator.html"
                  title="Topic Architecture Simulator"
                  class="w-full h-full border-0"
                ></iframe>
              </div>
            </div>
          </div>

          <!-- Tab 3: Quiz -->
          <div id="tab-quiz" class="tab-content h-full overflow-y-auto p-6 md:p-10 hidden">
            <div id="quiz-container">
              <!-- JS injects quiz content here -->
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="/modules/eli5-toggle.js"></script>
    <script src="/modules/eli5-kafka-data.js"></script>
    <script src="kafka-academy.js"></script>
    <script src="/modules/copy-code.js"></script>
  </body>
</html>
